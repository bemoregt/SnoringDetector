name: Build Universal (Intel + Apple Silicon) DMG

on:
  push:
    branches:
      - intel-mac
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Verify environment
        run: |
          python -c "import platform; print('Python arch:', platform.machine())"
          python -c "import numpy; print('NumPy:', numpy.__version__)"
          pyinstaller --version

      - name: Build universal2 app with PyInstaller
        run: |
          pyinstaller snoring_detector.spec --noconfirm --clean

      - name: Verify binary architecture
        run: |
          file dist/SnoringDetector.app/Contents/MacOS/SnoringDetector

      - name: Create DMG
        run: |
          APP="dist/SnoringDetector.app"
          DMG_NAME="SnoringDetector-universal2.dmg"
          TMP_DMG="tmp_universal.dmg"

          hdiutil create -size 300m -fs HFS+ -volname "SnoringDetector" "$TMP_DMG"
          DEVICE=$(hdiutil attach "$TMP_DMG" | grep /Volumes | awk '{print $NF}')

          cp -R "$APP" "/Volumes/SnoringDetector/"
          ln -s /Applications "/Volumes/SnoringDetector/Applications"

          hdiutil detach "$DEVICE"
          hdiutil convert "$TMP_DMG" -format UDZO -o "$DMG_NAME"
          rm -f "$TMP_DMG"

          ls -lh "$DMG_NAME"

      - name: Upload DMG as artifact
        uses: actions/upload-artifact@v4
        with:
          name: SnoringDetector-universal2
          path: SnoringDetector-universal2.dmg
          retention-days: 30

      - name: Write release notes
        run: |
          cat > release_notes.md << 'NOTES'
          ## Sleep Snoring Detector v1.0.0 (Universal2)

          Intel Mac + Apple Silicon 모두 지원하는 Universal2 빌드입니다.

          ### 요구사항
          - macOS 12.0 (Monterey) 이상
          - Intel Mac (x86_64) 또는 Apple Silicon (arm64)

          ### 설치 방법
          1. `SnoringDetector-universal2.dmg` 다운로드
          2. DMG를 열고 **SnoringDetector**를 **Applications**으로 드래그
          3. 첫 실행 시 우클릭 → 열기 (Gatekeeper 우회)
          NOTES

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v1.0.0-universal"
          gh release delete "$TAG" --yes 2>/dev/null || true
          git tag -d "$TAG" 2>/dev/null || true

          gh release create "$TAG" \
            SnoringDetector-universal2.dmg \
            --title "Sleep Snoring Detector v1.0.0 (Universal2 - Intel + Apple Silicon)" \
            --notes-file release_notes.md
