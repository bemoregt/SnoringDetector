name: Build Intel Mac DMG (x86_64 via Rosetta)

on:
  push:
    branches:
      - intel-mac
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14   # arm64 runner with Rosetta 2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Python 3.11 (universal2) from python.org
        run: |
          curl -LO https://www.python.org/ftp/python/3.11.9/python-3.11.9-macos11.pkg
          sudo installer -pkg python-3.11.9-macos11.pkg -target /
          # Verify universal2 Python exists
          file /Library/Frameworks/Python.framework/Versions/3.11/bin/python3.11

      - name: Install dependencies via Rosetta (x86_64)
        run: |
          PYTHON="arch -x86_64 /Library/Frameworks/Python.framework/Versions/3.11/bin/python3.11"
          PIP="arch -x86_64 /Library/Frameworks/Python.framework/Versions/3.11/bin/pip3"

          $PIP install --upgrade pip
          $PIP install -r requirements.txt
          $PIP install pyinstaller

          # Verify we are building for x86_64
          $PYTHON -c "import platform; print('Arch:', platform.machine())"

      - name: Build with PyInstaller (x86_64 via Rosetta)
        run: |
          arch -x86_64 /Library/Frameworks/Python.framework/Versions/3.11/bin/pyinstaller \
            snoring_detector.spec --noconfirm --clean

      - name: Verify binary architecture
        run: |
          file dist/SnoringDetector.app/Contents/MacOS/SnoringDetector

      - name: Create DMG
        run: |
          APP="dist/SnoringDetector.app"
          DMG_NAME="SnoringDetector-intel-x86_64.dmg"
          TMP_DMG="tmp_intel.dmg"

          hdiutil create -size 300m -fs HFS+ -volname "SnoringDetector" "$TMP_DMG"
          DEVICE=$(hdiutil attach "$TMP_DMG" | grep /Volumes | awk '{print $NF}')

          cp -R "$APP" "/Volumes/SnoringDetector/"
          ln -s /Applications "/Volumes/SnoringDetector/Applications"

          hdiutil detach "$DEVICE"
          hdiutil convert "$TMP_DMG" -format UDZO -o "$DMG_NAME"
          rm -f "$TMP_DMG"

          ls -lh "$DMG_NAME"

      - name: Upload DMG as artifact
        uses: actions/upload-artifact@v4
        with:
          name: SnoringDetector-intel-x86_64
          path: SnoringDetector-intel-x86_64.dmg
          retention-days: 30

      - name: Write release notes
        run: |
          cat > release_notes.md << 'NOTES'
          ## Sleep Snoring Detector v1.0.0 (Intel Mac x86_64)

          Intel Mac 전용 빌드입니다.

          ### 요구사항
          - macOS 12.0 (Monterey) 이상
          - Intel Mac (x86_64)

          ### 설치 방법
          1. `SnoringDetector-intel-x86_64.dmg` 다운로드
          2. DMG를 열고 **SnoringDetector**를 **Applications**으로 드래그
          3. 첫 실행 시 우클릭 → 열기 (Gatekeeper 우회)

          ### 참고
          - Apple Silicon(M1/M2/M3) Mac 사용자는 arm64 릴리즈를 사용하세요.
          NOTES

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v1.0.0-intel"
          gh release delete "$TAG" --yes 2>/dev/null || true
          git tag -d "$TAG" 2>/dev/null || true

          gh release create "$TAG" \
            SnoringDetector-intel-x86_64.dmg \
            --title "Sleep Snoring Detector v1.0.0 (Intel Mac x86_64)" \
            --notes-file release_notes.md
