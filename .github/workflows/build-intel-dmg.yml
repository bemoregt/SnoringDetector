name: Build Intel Mac DMG

on:
  push:
    branches:
      - intel-mac
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-13   # Intel x86_64 runner

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python (x86_64)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: 'x64'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Verify architecture
        run: |
          python -c "import platform; print('Python arch:', platform.machine())"
          python -c "import numpy; print('NumPy:', numpy.__version__)"

      - name: Build with PyInstaller
        run: |
          pyinstaller snoring_detector.spec --noconfirm --clean

      - name: Verify binary architecture
        run: |
          file dist/SnoringDetector.app/Contents/MacOS/SnoringDetector

      - name: Create DMG
        run: |
          APP="dist/SnoringDetector.app"
          DMG_NAME="SnoringDetector-intel-x86_64.dmg"
          TMP_DMG="tmp_intel.dmg"

          # Create a temporary writable DMG
          hdiutil create -size 200m -fs HFS+ -volname "SnoringDetector" "$TMP_DMG"
          DEVICE=$(hdiutil attach "$TMP_DMG" | grep /Volumes | awk '{print $NF}')

          cp -R "$APP" "/Volumes/SnoringDetector/"
          ln -s /Applications "/Volumes/SnoringDetector/Applications"

          hdiutil detach "$DEVICE"
          hdiutil convert "$TMP_DMG" -format UDZO -o "$DMG_NAME"
          rm -f "$TMP_DMG"

          echo "DMG created: $DMG_NAME"
          ls -lh "$DMG_NAME"

      - name: Upload DMG as artifact
        uses: actions/upload-artifact@v4
        with:
          name: SnoringDetector-intel-x86_64
          path: SnoringDetector-intel-x86_64.dmg
          retention-days: 30

      - name: Create GitHub Release and upload DMG
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v1.0.0-intel"
          # Delete existing tag/release if present
          gh release delete "$TAG" --yes 2>/dev/null || true
          git tag -d "$TAG" 2>/dev/null || true

          gh release create "$TAG" \
            SnoringDetector-intel-x86_64.dmg \
            --title "Sleep Snoring Detector v1.0.0 (Intel Mac)" \
            --notes "## Intel Mac (x86_64) Build

This release targets Intel-based Macs (x86_64 architecture).

### Requirements
- macOS 12.0 (Monterey) or later
- Intel Mac (x86_64)

### Installation
1. Download \`SnoringDetector-intel-x86_64.dmg\`
2. Open the DMG and drag **SnoringDetector** to **Applications**
3. On first launch, right-click → Open to bypass Gatekeeper

### Notes
- For Apple Silicon (M1/M2/M3) Macs, use the [arm64 release](../../releases/latest)
" \
            --prerelease
